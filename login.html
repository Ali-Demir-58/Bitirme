<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Finansal Analiz Platformu</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="resources/favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1a365d 0%, #4299e1 100%);
        }

        .text-gradient {
            background: linear-gradient(135deg, #d69e2e, #f6ad55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        details summary::-webkit-details-marker {
            display: none;
        }

        details[open] .mobile-menu-panel {
            display: block;
        }

        .mobile-menu-panel {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-3">
                    <img src="resources/favicon.png" alt="Logo" class="w-8 h-8">
                    <span class="text-lg sm:text-xl font-bold text-gray-900">Finansal Analiz</span>
                </a>

                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Anasayfa</a>
                    <a href="analysis.html" class="text-gray-700 hover:text-blue-600 font-medium">Analiz</a>
                    <a href="guide.html" class="text-gray-700 hover:text-blue-600 font-medium">Rehber</a>
                    <a href="iletisim.html" class="text-gray-700 hover:text-blue-600 font-medium">İletişim</a>
                    <a href="login.html" class="text-blue-600 font-semibold">Giriş Yap</a>
                    <a href="register.html"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold">
                        Kayıt Ol
                    </a>
                </div>

                <details class="md:hidden relative">
                    <summary class="list-none cursor-pointer p-2 text-gray-700 rounded-lg hover:bg-gray-100">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </summary>

                    <div
                        class="mobile-menu-panel absolute right-0 mt-3 w-56 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden">
                        <a href="index.html" class="block px-5 py-3 text-gray-700 hover:bg-gray-50">Anasayfa</a>
                        <a href="analysis.html" class="block px-5 py-3 text-gray-700 hover:bg-gray-50">Analiz</a>
                        <a href="guide.html" class="block px-5 py-3 text-gray-700 hover:bg-gray-50">Rehber</a>
                        <a href="iletisim.html" class="block px-5 py-3 text-gray-700 hover:bg-gray-50">İletişim</a>
                        <a href="login.html" class="block px-5 py-3 text-blue-600 font-semibold bg-blue-50">Giriş
                            Yap</a>
                        <a href="register.html" class="block px-5 py-3 text-gray-700 hover:bg-gray-50">Kayıt Ol</a>
                    </div>
                </details>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="pt-28 pb-14 gradient-bg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl sm:text-5xl font-bold text-white mb-5">
                Giriş <span class="text-gradient">Yap</span>
            </h1>
            <p class="text-base sm:text-xl text-blue-100 max-w-3xl mx-auto">
                Kişisel portföy ve bütçe bilgilerinize erişmek için hesabınıza giriş yapın.
            </p>
        </div>
    </section>

    <!-- Login Form -->
    <main class="py-12 sm:py-16">
        <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-2xl shadow p-6 sm:p-8 border border-blue-100">

                <h2 class="text-2xl font-bold text-gray-900 mb-2">Giriş Yap</h2>
                <p class="text-gray-600 mb-8">Email ve şifrenizle giriş yapın.</p>

                <form class="space-y-5" onsubmit="loginUser(event)">
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">E-posta</label>
                        <input type="email" id="email" required placeholder="ornek@mail.com"
                            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">Şifre</label>
                        <input type="password" id="password" required placeholder="Şifreniz"
                            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all">
                        Giriş Yap
                    </button>
                </form>

                <div id="auth-status" class="hidden mt-6 p-4 rounded-lg text-sm font-medium"></div>

                <p class="text-sm text-gray-600 mt-6 text-center">
                    Hesabınız yok mu?
                    <a href="register.html" class="text-blue-600 hover:text-blue-700 font-semibold">Kayıt olun</a>
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>

    <script>
        async function loginUser(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const status = document.getElementById('auth-status');

            status.className = 'mt-6 p-4 rounded-lg text-sm font-medium bg-blue-50 text-blue-700 border border-blue-200';
            status.textContent = 'Giriş yapılıyor...';
            status.classList.remove('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                status.className = 'mt-6 p-4 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
                status.textContent = error.message;
                return;
            }

            status.className = 'mt-6 p-4 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200';
            status.textContent = 'Giriş başarılı. Analiz sayfasına yönlendiriliyorsunuz...';

            setTimeout(() => {
                window.location.href = 'analysis.html';
            }, 900);
        }
    </script>
</body>

</html>
